<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WFO Tracker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f6f7fb;
margin:0;
padding:16px;
}

.container{
max-width:420px;
margin:auto;
background:white;
border-radius:14px;
padding:16px;
box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

.title{
font-size:20px;
font-weight:700;
margin-bottom:10px;
text-align:center;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
font-weight:600;
margin-bottom:12px;
}

.metrics{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:16px;
}

.metric{
background:#f3f4f6;
border-radius:10px;
padding:10px;
text-align:center;
font-size:12px;
}

.metric span{
font-size:18px;
font-weight:700;
display:block;
}

.progressWrap{
text-align:center;
margin-bottom:16px;
}

.progress{
height:8px;
background:#e5e7eb;
border-radius:10px;
overflow:hidden;
margin:6px 0;
}

.bar{
height:8px;
background:#16a34a;
width:0%;
transition:width .4s;
}

.info{
font-size:12px;
color:#6b7280;
margin-top:6px;
}

.legend{
font-size:11px;
text-align:center;
margin-bottom:8px;
color:#6b7280;
}

.actions{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-bottom:14px;
}

button{
border:none;
padding:10px;
border-radius:8px;
font-size:13px;
cursor:pointer;
}

.today{background:#6366f1;color:white}
.wfo{background:#16a34a;color:white}
.leaveBtn{background:#f59e0b;color:white}
.clear{background:#ef4444;color:white}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
font-size:12px;
}

.dayHead{
text-align:center;
font-weight:600;
color:#6b7280;
}

.day{
height:32px;
display:flex;
align-items:center;
justify-content:center;
border-radius:6px;
background:#f3f4f6;
cursor:pointer;
}

.wfoDay{background:#16a34a;color:white}
.leaveDay{background:#f59e0b;color:white}

.weekend{
background:#fee2e2;
color:#b91c1c;
}

.todayBorder{
border:2px solid #6366f1;
}

@media (prefers-color-scheme: dark){

body{background:#111827;color:white}

.container{background:#1f2937}

.metric{background:#374151}

.day{background:#374151}

}

</style>
</head>

<body>

<div class="container">

<div class="title">🏢 WFO Tracker</div>

<div class="header">
<div onclick="changeMonth(-1)">◀</div>
<div id="monthTitle"></div>
<div onclick="changeMonth(1)">▶</div>
</div>

<div class="metrics">

<div class="metric">
<span id="work"></span>
Working Days
</div>

<div class="metric">
<span id="leave"></span>
Leave/Holiday
</div>

<div class="metric">
<span id="eff"></span>
Effective Days
</div>

<div class="metric">
<span id="req"></span>
Required WFO
</div>

</div>

<div class="progressWrap">

<div id="done"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="info">
Need <b id="remain"></b> more • Working Days Left <b id="daysLeft"></b>
</div>

<div class="info">
Compliance: <b id="percent"></b>%
</div>

<div id="status"></div>

</div>

<div class="legend">
🟢 WFO &nbsp;&nbsp; 🟡 Leave &nbsp;&nbsp; 🔴 Weekend
</div>

<div class="actions">

<button class="today" onclick="markToday()">✓ WFO Today</button>
<button class="wfo" onclick="mark('wfo')">🏢 Mark WFO</button>
<button class="leaveBtn" onclick="mark('leave')">🌴 Mark Leave</button>
<button class="clear" onclick="clearDay()">✖ Clear</button>

</div>

<div class="calendar" id="calendar"></div>

</div>

<script>

const STORAGE_KEY="wfoTrackerData";

let data=JSON.parse(localStorage.getItem(STORAGE_KEY))||{};
let selected=null;
let current=new Date();

function key(d){return d.toISOString().split("T")[0];}

function workingDays(y,m){

let total=new Date(y,m+1,0).getDate();
let c=0;

for(let i=1;i<=total;i++){
let d=new Date(y,m,i);
let day=d.getDay();
if(day!==0 && day!==6)c++;
}

return c;

}

function buildCalendar(){

let cal=document.getElementById("calendar");
cal.innerHTML="";

let days=["M","T","W","T","F","S","S"];

days.forEach(d=>{
let div=document.createElement("div");
div.className="dayHead";
div.innerText=d;
cal.appendChild(div);
});

let y=current.getFullYear();
let m=current.getMonth();

let first=new Date(y,m,1);
let start=(first.getDay()+6)%7;

for(let i=0;i<start;i++)cal.appendChild(document.createElement("div"));

let total=new Date(y,m+1,0).getDate();
let todayKey=key(new Date());

for(let i=1;i<=total;i++){

let date=new Date(y,m,i);
let full=key(date);

let div=document.createElement("div");
div.className="day";
div.innerText=i;

let day=date.getDay();

if(day===0||day===6)div.classList.add("weekend");

if(data[full]=="wfo")div.classList.add("wfoDay");
if(data[full]=="leave")div.classList.add("leaveDay");

if(full===todayKey)div.classList.add("todayBorder");

div.onclick=()=>{
if(day===0||day===6)return;
selected=full;
};

cal.appendChild(div);
}

}

function calculate(){

let y=current.getFullYear();
let m=current.getMonth();

let work=workingDays(y,m);

let leave=0;
let wfo=0;

Object.keys(data).forEach(d=>{
let dt=new Date(d);
if(dt.getFullYear()==y && dt.getMonth()==m){
if(data[d]=="leave")leave++;
if(data[d]=="wfo")wfo++;
}
});

let eff=work-leave;
let req=Math.ceil(eff*0.6);
let remain=Math.max(req-wfo,0);

document.getElementById("work").innerText=work;
document.getElementById("leave").innerText=leave;
document.getElementById("eff").innerText=eff;
document.getElementById("req").innerText=req;

document.getElementById("done").innerText=wfo+" / "+req+" WFO";

document.getElementById("remain").innerText=remain;

let prog=(wfo/req)*100;

document.getElementById("bar").style.width=prog+"%";

let today=new Date();
let end=new Date(y,m+1,0);

let daysLeft=0;

for(let d=new Date(today);d<=end;d.setDate(d.getDate()+1)){
let day=d.getDay();
if(day!==0 && day!==6)daysLeft++;
}

document.getElementById("daysLeft").innerText=daysLeft;

let percent=Math.round((wfo/work)*100);

document.getElementById("percent").innerText=percent;

let status="";

if(remain>daysLeft)status="🔴 At Risk";
else if(remain>daysLeft/2)status="🟡 Behind";
else status="🟢 On Track";

document.getElementById("status").innerText=status;

}

function mark(type){
if(!selected){alert("Select weekday");return;}
data[selected]=type;
save();
}

function markToday(){
let today=new Date();
let day=today.getDay();
if(day===0||day===6){alert("Weekend");return;}
data[key(today)]="wfo";
save();
}

function clearDay(){
if(!selected)return;

if(confirm("Clear selected day?")){
delete data[selected];
save();
}

}

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
render();
}

function changeMonth(s){
current.setMonth(current.getMonth()+s);
render();
}

function render(){

document.getElementById("monthTitle").innerText=
current.toLocaleString("default",{month:"long",year:"numeric"});

buildCalendar();
calculate();

}

render();

</script>

</body>
</html>
